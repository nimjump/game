<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
  <!-- PERF/BUG FIX: Nimiq Hub's own popup (hub.nimiq.com) starts a hardcoded
       1-SECOND timeout the instant it loads (see nimiq/hub's RpcApi.start()
       -> RpcServer.init(onClientTimeout), window.setTimeout(...,1000)) —
       if our client's first ping doesn't reach an already-booted Hub SPA
       within that 1s window, Hub gives up and shows its own "Invalid
       Request" error page, which is what produces the "Connection was
       closed" error our RPC client then sees (confirmed by reading Hub's
       and its rpc library's actual source — this is NOT a popup-blocking or
       user-gesture-timing issue, a genuine synchronous click still hits
       this exact race). The Hub SPA has to do real work in that same
       window — bootstrap its Vue app, AND its Keyguard client/iframe
       (keyguard.nimiq.com) — before it can even start listening for our
       ping. DNS/TLS/connection warmup ahead of time (before the popup ever
       opens) is the one part of that budget we can shave down for free —
       every visitor pays this cost on their very first sign-in attempt.
       Safe unconditionally: no user data sent, browser just resolves DNS/
       opens a TLS connection speculatively. -->
  <link rel="preconnect" href="https://hub.nimiq.com" crossorigin>
  <link rel="dns-prefetch" href="https://hub.nimiq.com">
  <link rel="preconnect" href="https://keyguard.nimiq.com" crossorigin>
  <link rel="dns-prefetch" href="https://keyguard.nimiq.com">
  <title>$GODOT_PROJECT_NAME</title>
  <style>
    html, body {
      margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden;
      /* Mobile polish — none of this changes layout, only removes native
         browser chrome/gestures that fight a swipe-controlled game:
         - overscroll-behavior:none stops iOS/Android's rubber-band bounce
           and pull-to-refresh from firing when a swipe starts near the top
           or bottom edge (a real risk here — the whole game is swipe-driven,
           and Chrome's pull-to-refresh gesture starts from the exact same
           edge-drag a player uses to move).
         - -webkit-touch-callout:none stops iOS's long-press "callout" menu
           (copy/save-image popup) from interrupting a held touch mid-swipe.
         - -webkit-user-select/user-select:none stops the OS text-selection
           handles from appearing on a long-press anywhere in the canvas.
         - -webkit-tap-highlight-color:transparent removes the default gray
           flash Android/older iOS draws on every tap — with a custom themed
           UI (UITheme.gd) that flash reads as an unstyled/broken tap state
           rather than the game's own press feedback. */
      overscroll-behavior:none;
      -webkit-touch-callout:none;
      -webkit-user-select:none; user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    /* ── SAFE AREA (notch / Dynamic Island / home-indicator) ────────────────
       viewport-fit=cover above tells the browser to let the page extend
       full-bleed under the notch/home-indicator instead of auto-letterboxing
       — without this, the actual play surface (canvas) would draw its own
       UI edge-to-edge and iPhone's notch/Dynamic Island or the home-indicator
       bar could sit right on top of real, tappable content (bottom nav bar,
       PLAY button, top HUD). Fix: inset the canvas AND the loading/splash
       overlay by env(safe-area-inset-*) so Godot's own viewport only ever
       spans the actual safe rectangle — nothing GDScript-side needs to know
       about this, every existing anchor/margin in the game continues to be
       relative to "the whole screen" because that's still what Godot sees.
       env(..., 0px) fallback makes this a no-op on any browser that doesn't
       support the safe-area env() variables at all (plain desktop, older
       Android) — html/body's #000 background fills the resulting margin on
       devices that DO have a notch/home-indicator, same color as the splash
       screen so it reads as intentional letterboxing, not a layout bug. */
    #canvas {
      /* BUG FIX: this used to be top/bottom/left/right all set + width:auto/
         height:auto. That looked right on paper (a position:fixed box with
         all four offsets pinned, "auto" filling the gap) but <canvas> is a
         REPLACED element (like <img>/<video>) — per the CSS spec, a
         replaced element's 'auto' width/height in this configuration
         resolves to its INTRINSIC size (canvas defaults to 300x150 CSS px
         with no width/height attribute) instead of stretching to fill the
         left/right or top/bottom gap the way a plain <div> would. That's
         exactly "small canvas stuck in the corner, doesn't fill the
         screen" — the report this fixes. Explicit calc() width/height
         removes the ambiguity entirely: no reliance on replaced-element
         auto-sizing behavior at all, just an exact number every browser
         computes the same way. top/left position it, width/height size it,
         'right'/'bottom' aren't needed (and would over-constrain the box
         if combined with an explicit width/height anyway). */
      position:fixed;
      top:    env(safe-area-inset-top, 0px);
      left:   env(safe-area-inset-left, 0px);
      width:  calc(100% - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px));
      height: calc(100% - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
      outline:none; touch-action:none; image-rendering:pixelated;
    }
    #status, #status-splash, #status-progress { position:fixed; }
    #status {
      top:    env(safe-area-inset-top, 0px);
      left:   env(safe-area-inset-left, 0px);
      width:  calc(100% - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px));
      height: calc(100% - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
    }
    #status {
      background-color: $GODOT_SPLASH_COLOR;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      visibility:hidden;
    }
    /* #status-splash (the splash <img>) needs its own explicit inset:0 —
       it's position:fixed (see the shared selector above) with NO offsets
       of its own, this used to be full-viewport (top:0/left:0/right:0/
       bottom:0) matching the original pre-safe-area-fix code; that's what
       lets its own max-width/max-height:100% + margin:auto below actually
       center it (position:fixed/absolute + all-sides-0 + margin:auto on a
       sized box is a real, classic centering technique — but it only works
       if all four offsets are actually 0, not left unset/auto). Kept
       viewport-relative (not safe-area-inset-relative like #status/#canvas
       above) — same as it always was; the splash is shown for such a short
       window before the engine takes over that this was never worth
       revisiting on its own. */
    #status-splash { top:0; left:0; right:0; bottom:0; }

    /* NOTE: a desktop "letterbox" variant (capping #canvas to the portrait
       aspect ratio + centering it, black bars either side) was tried here
       and reverted on request — the game fills the whole browser window on
       desktop now, same as before, full-bleed. The portrait-only UI (e.g.
       the onboarding overlay's anchor_left=0.08/anchor_right=0.92) can still
       look stretched/wide on a very wide desktop window as a result — that
       tradeoff was chosen deliberately over black bars, not missed. */
    #status-splash { max-height:100%; max-width:100%; margin:auto; }
    #status-splash.show-image--false { display:none; }
    #status-splash.fullsize--true { height:100%; width:100%; object-fit:contain; }
    #status-splash.use-filter--false { image-rendering:pixelated; }
    #status-progress, #status-notice { display:none; }
    #status-progress { bottom:10%; width:50%; margin:0 auto; }
    #status-notice {
      background-color:#5b3943; border-radius:0.5rem; border:1px solid #9b3943;
      color:#e0e0e0; font-family:'Noto Sans','Droid Sans',Arial,sans-serif;
      line-height:1.3; margin:0 2rem; overflow:hidden; padding:1rem; text-align:center; z-index:1;
    }

    /* ── PORTRAIT LOCK ─────────────────────────────────────────────────────
       Game is portrait-only. The Screen Orientation API (screen.orientation.
       lock) only works inside an installed/fullscreen PWA on the browsers
       that support it at all (mostly Android Chrome) — plain mobile Safari
       tabs can't be force-locked via JS. So instead of relying on JS lock
       (which silently fails on iOS and leaves the canvas resizing/rotating
       with all the side effects that caused — toasts, panels, anchors going
       stale), this uses a pure-CSS media query: whenever the viewport is
       wider than it is tall on a touch device, hide the game canvas entirely
       and show a "rotate your phone" blocker instead. The canvas never sees
       a landscape size at all, so none of the GDScript resize/orientation
       code ever runs in landscape — nothing to go stale. */
    #rotate-lock {
      display:none;
      position:fixed; inset:0; z-index:9999;
      background:#000;
      color:#e8d9c0;
      flex-direction:column; align-items:center; justify-content:center;
      font-family:'Noto Sans','Droid Sans',Arial,sans-serif;
      text-align:center; padding:0 2rem;
    }
    #rotate-lock .icon { font-size:3rem; margin-bottom:1rem; }
    /* pointer:coarse + hover:none = an actual touchscreen (phone/tablet),
       not a desktop browser window that just happens to be wide — device-
       width breakpoints are unreliable for this, pointer/hover capability
       is the correct modern way to target "real mobile device" specifically. */
    @media (orientation: landscape) and (pointer: coarse) and (hover: none) {
      #rotate-lock { display:flex; }
      #canvas, #status { display:none !important; }
    }
  </style>
  $GODOT_HEAD_INCLUDE
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon/ico-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon/ico-512.png">
  <!-- Nimiq Pay (and other mini-app hosts / "add to home screen" flows) don't
       parse this page's <head> for the favicon link above — they read the
       icon from a Web App Manifest instead, same convention the W3C MiniApp
       Manifest spec inherits from PWAs. Without this, the game works fine in
       a normal browser tab (favicon shows there) but shows no icon inside
       Nimiq Pay's mini-app list.
       IMPORTANT: manifest icon "sizes" must be standard PWA sizes (192x192 /
       512x512) — many manifest parsers (Nimiq Pay's included, most likely)
       silently SKIP non-standard sizes like the original 1254x1254-only
       icon this manifest used to ship, which is why no icon ever showed up
       inside Nimiq Pay even though the file itself was present and valid. -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon/ico-180.png">
  <meta name="theme-color" content="#242424">

  <!-- ── DEV MODE ──────────────────────────────────────────────────────────────
       Add ?dev to URL to enable debug overlay, FPS counter, and verbose logs.
       Example: https://nimjump.io/?dev
       In production nothing extra is loaded or visible.
  ─────────────────────────────────────────────────────────────────────────── -->
  <script data-cfasync="false">
    window._DEV = (new URLSearchParams(location.search)).has('dev');
  </script>

  <!-- ── NIMIQ SDK ─────────────────────────────────────────────────────────── -->
  <script data-cfasync="false" type="module">
    window._nimiqReady    = undefined;
    window._nimiqAddress  = '';
    window._nimiqLabel    = '';
    window._nimiqAvatar   = '';
    window._nimiqDeviceId = '';
    window._nimiqData     = null;

    // BUG FIX (web sign-in sometimes routes to the Nimiq-Pay-only flow even
    // in a plain browser, silently skipping the Hub API popup entirely):
    // Main.gd's Play/Connect-Wallet handlers used to decide mini-app-SDK vs
    // Hub-API routing by reading ONLY window._nimiqProviderMissing — which
    // _initNimiq() below never sets until its OWN async handshake actually
    // finishes rejecting: a fixed 3.5s startup delay, PLUS sdk.init()'s own
    // internal 10s timeout, PLUS an unpkg module fetch — worst case ~15s+
    // before it's ever set. A player who taps Play quickly (the completely
    // normal case) hits that check while it's still `undefined`, which read
    // as `false` — the code then treated "not yet confirmed missing" as
    // "assume still might be Nimiq Pay", took the mini-app-SDK detour
    // (which can never succeed outside Nimiq Pay), burned its own several
    // seconds of internal timeouts, and only fell through to a guest/no-
    // wallet start — the Hub API path was never even reached. window.nimiq
    // and window._nimiqReady are also both still unset at that same early
    // moment for the exact same reason, so none of the three ever help fast
    // enough on their own.
    //
    // window._nimiqInsidePayNow() fixes this by checking window.nimiqPay
    // too — the flag Nimiq Pay's own WebView host injects directly, IN
    // ADDITION to (not instead of) window.nimiq/_nimiqReady — so a genuine
    // Nimiq Pay session is very unlikely to still show false the instant a
    // real user gesture (a Play tap) can happen at all. Exposed as its own
    // always-defined global (NOT nested inside the dismissible Nimiq-Pay-
    // banner IIFE further below, which early-returns and skips its own
    // internal copy of this same check entirely once the banner has been
    // dismissed once this session) so GDScript can call it synchronously,
    // with zero waiting, at the exact moment of any Play/Connect tap.
    window._nimiqInsidePayNow = function() {
      return !!(window.nimiqPay || window.nimiq || window._nimiqReady);
    };

    async function _initNimiq() {
      try {
        // Pinned (was @latest) — this package is still 0.x, so @latest could
        // silently pull a behavior-breaking update (e.g. changing how
        // listAccounts()/connect() persist across sessions, which is exactly
        // the kind of change that would look like "keeps asking to
        // reconnect/resign for no reason" with zero corresponding change on
        // our side or in the backend logs). Bump this deliberately, on
        // purpose, after testing — never let it float again.
        const sdk = await import('https://unpkg.com/@nimiq/mini-app-sdk@0.1.0/dist/index.js');
        let nimiq;
        try {
          nimiq = await sdk.init({ timeout: 10000 });
          window.nimiq = nimiq;
        } catch(e) {
          if (window._DEV) console.warn('[Nimiq] Provider not found:', e);
          window._nimiqProviderMissing = true; // definitive: we are NOT inside Nimiq Pay
          return;
        }
        let address = '';
        try {
          const listed = await nimiq.listAccounts();
          if (Array.isArray(listed) && listed.length > 0 && typeof listed[0] === 'string') address = listed[0];
        } catch(e) { if (window._DEV) console.warn('[Nimiq] listAccounts:', e); }
        if (!address) {
          try {
            await nimiq.connect();
            const listed2 = await nimiq.listAccounts();
            if (Array.isArray(listed2) && listed2.length > 0 && typeof listed2[0] === 'string') address = listed2[0];
          } catch(e) { if (window._DEV) console.warn('[Nimiq] connect:', e); }
        }
        window._nimiqAddress = address ? String(address) : '';
        window._nimiqLabel   = address ? String(address).slice(0, 9) : '';
        // REMOVED per request: sdk.requestDeviceIdentifier({reason:'NimJump score
        // ranking'}) used to fire here on every load — this is what triggered
        // Nimiq Pay's native "allow device identifier" permission prompt the
        // first time a player opened the game, citing leaderboard ranking as
        // the reason. Dropped entirely; window._nimiqDeviceId stays '' (see
        // init above), so guests without a connected wallet just don't get a
        // persistent cross-session id — wallet connect is the only path to a
        // saved rank now, no separate permission prompt.
        window._nimiqLanguage = (window.nimiqPay && window.nimiqPay.language)
          || (navigator.language ? navigator.language.split('-')[0] : 'en');
        window._nimiqData = { address: window._nimiqAddress, label: window._nimiqLabel, deviceId: window._nimiqDeviceId, _provider: nimiq };
        try {
          if (window._nimiqAddress && window.getNimiqAvatar)
            window._nimiqAvatar = await window.getNimiqAvatar(window._nimiqAddress) || '';
        } catch(e) { window._nimiqAvatar = ''; }
        window._nimiqReady = true;
      } catch(e) {
        if (window._DEV) console.warn('[Nimiq] SDK load failed:', e);
        window._nimiqProviderMissing = true; // SDK itself failed to load -> definitely not inside Nimiq Pay
      }
    }
    setTimeout(function() {
      if (typeof requestIdleCallback !== 'undefined') requestIdleCallback(_initNimiq, { timeout: 2000 });
      else _initNimiq();
    }, 3500);
  </script>

  <!-- ── NIMIQ HUB API (web browser sign-in) ─────────────────────────────────
       Only relevant OUTSIDE Nimiq Pay: real wallet sign-in for players who
       open the game in a plain browser tab. This is a SEPARATE integration
       from the mini-app SDK above (_initNimiq) — that one only initializes
       inside Nimiq Pay's own host and rejects everywhere else (sets
       window._nimiqProviderMissing), so it can never work standalone. The
       Hub API talks to hub.nimiq.com directly via a popup and works in any
       normal browser.

       BUG FIX ("Invalid Request" from hub.nimiq.com, persisting even after
       the COOP/COEP fixes in main.go): Nimiq's own docs are explicit that
       Hub API methods "must be called synchronously within a user action,
       such as a click" (https://nimiq.github.io/hub/usage#calling-methods).
       This used to be lazy-loaded — _loadHubApi() only started its dynamic
       import() of the CDN module the FIRST time window._nimiqHubSign() was
       actually called, i.e. from inside the Play/Connect tap's own handler.
       A dynamic import() is a real network fetch, not a same-tick
       microtask — by the time it resolved and hubApi.signMessage() (which
       internally does window.open()) finally ran, the click's transient
       user-activation window had already elapsed. The popup could still
       open (window.open() doesn't hard-require activation in every
       browser), but without a genuine synchronous-gesture-linked open,
       hub.nimiq.com's own client-side RPC handshake with our page
       apparently doesn't reliably complete — surfacing as "Invalid
       Request"/timeout on Hub's side. Fix: kick off _loadHubApi() eagerly,
       right away on page load (below), instead of waiting for the first
       sign attempt — a small, harmless module fetch everyone already pays
       for anyway once Godot itself finishes loading. By the time a player
       can realistically tap Play/Connect, window._HubApiCtor is normally
       already resolved, so window._nimiqHubSign() below calls
       hubApi.signMessage() (and therefore window.open()) IMMEDIATELY,
       fully synchronously inside the click handler's own call stack — no
       .then() in between. The old lazy/async path is kept ONLY as a
       fallback for the rare case where the module genuinely hasn't finished
       loading yet by click-time (very slow network) — that fallback can
       still hit the same popup-blocking risk this fix is otherwise
       eliminating, but it's now the rare edge case, not the default path.
       IMPORTANT (unchanged): window._nimiqHubSign() must still only ever be
       called from a real user gesture (a button's pressed handler) — see
       NimiqJS.gd's start_hub_sign() doc comment. -->
  <script data-cfasync="false">
  (function() {
    var DEV = window._DEV;
    var _hubApiPromise = null;

    function _bytesToHex(bytes) {
      var hex = '';
      for (var i = 0; i < bytes.length; i++) {
        var b = bytes[i].toString(16);
        hex += (b.length === 1 ? '0' + b : b);
      }
      return hex;
    }

    // Dynamic import, same pattern as the identicons library above. Version
    // pinned (see the mini-app SDK comment above for why: an unpinned
    // @latest could silently pull a behavior-breaking update with zero
    // corresponding change on our side). Kicked off EAGERLY below (not
    // waiting for the first sign attempt) — see this script block's
    // top-of-file doc comment for why: window.open() needs to fire
    // synchronously inside the click handler, which is only possible if
    // this module is already loaded by the time a real Play/Connect tap
    // happens.
    function _loadHubApi() {
      if (_hubApiPromise) return _hubApiPromise;
      _hubApiPromise = new Promise(function(resolve, reject) {
        window._HubApiCtor = null;
        var s = document.createElement('script');
        s.type = 'module';
        s.textContent = [
          'import HubApi from "https://cdn.jsdelivr.net/npm/@nimiq/hub-api@v1.2.3/dist/standalone/HubApi.standalone.es.js";',
          'window._HubApiCtor = HubApi;'
        ].join('\n');
        document.head.appendChild(s);
        var waited = 0;
        var poll = setInterval(function() {
          waited += 100;
          if (window._HubApiCtor) {
            clearInterval(poll);
            resolve(window._HubApiCtor);
          } else if (waited >= 15000) {
            clearInterval(poll);
            reject(new Error('hub_api_load_timeout'));
          }
        }, 100);
      });
      return _hubApiPromise;
    }

    var _hubApiInstance = null;
    function _getHubApi(HubApiCtor) {
      if (!_hubApiInstance) {
        // Mainnet endpoint — matches the backend's default NIMIQ_NETWORK=
        // mainnet (see backend/.env.example). Swap to
        // 'https://hub.nimiq-testnet.com' if this deployment ever runs
        // against testnet.
        _hubApiInstance = new HubApiCtor('https://hub.nimiq.com');
      }
      return _hubApiInstance;
    }

    // Called from GDScript (NimiqJS.gd's start_hub_sign()). Writes result to
    // document.body.dataset.nimiqHubSign — same async-callback-via-DOM-dataset
    // pattern used by the mini-app SDK's start_sign() (see NimiqJS.gd),
    // because Emscripten's JavaScriptBridge.eval() can't directly await a
    // JS Promise from GDScript.
    // Result shape: {ok:true, address, publicKey (hex), signature (hex)}
    //            or {ok:false, err}
    // NOTE: unlike the mini-app SDK path, Hub API's signMessage() returns the
    // signer's address directly in the SAME popup interaction — no separate
    // "connect"/"listAccounts" round trip needed first.
    function _finishHubSign(promise) {
      promise.then(function(result) {
        var pubHex = _bytesToHex(result.signerPublicKey);
        var sigHex = _bytesToHex(result.signature);
        document.body.dataset.nimiqHubSign = JSON.stringify({
          ok: true, address: result.signer, publicKey: pubHex, signature: sigHex
        });
        console.log('[HubSign] ok addr=' + result.signer);
      }).catch(function(err) {
        var msg = (err && err.message) ? err.message : String(err);
        console.warn('[HubSign] failed:', err, msg);
        document.body.dataset.nimiqHubSign = JSON.stringify({ ok: false, err: msg });
      });
    }
    // DIAGNOSTIC (deliberately NOT gated behind `if (DEV)` — this is the one
    // thing we actually need to see in a real player's console to tell
    // whether a given build/deploy is even running this fix at all, vs an
    // older cached build, vs the fix running but hub.nimiq.com still
    // rejecting for some other reason). Safe to remove once this is
    // confirmed working across a few real tests.
    console.log('[HubSign] script loaded, build tag=eager-preload-v1');

    window._nimiqHubSign = function(message) {
      document.body.dataset.nimiqHubSign = '';
      // FAST PATH (the normal case — see this file's top-of-block doc
      // comment): the eager preload below has almost certainly already
      // resolved window._HubApiCtor by the time a real Play/Connect tap can
      // happen, so call signMessage() (and therefore window.open())
      // IMMEDIATELY here, with zero .then()/microtask hop, so it runs
      // inside this click handler's own synchronous call stack.
      if (window._HubApiCtor) {
        console.log('[HubSign] FAST PATH — calling signMessage synchronously');
        _finishHubSign(_getHubApi(window._HubApiCtor).signMessage({ appName: 'NimJump', message: message }));
        return;
      }
      // SLOW-NETWORK FALLBACK ONLY: module genuinely isn't ready yet. This
      // still risks the popup-blocking/handshake issue the eager preload
      // exists to avoid, but it's strictly better than never attempting at
      // all, and should be rare in practice.
      console.warn('[HubSign] SLOW PATH — _HubApiCtor not ready yet at click time, falling back to async load (popup may be blocked)');
      _finishHubSign(_loadHubApi().then(function(HubApiCtor) {
        return _getHubApi(HubApiCtor).signMessage({ appName: 'NimJump', message: message });
      }));
    };

    // ── WEB PAYMENT via Hub API checkout ────────────────────────────────────
    // Counterpart to _nimiqHubSign for PAYMENTS (VS room entry fee, cosmetics).
    // Inside Nimiq Pay, NimiqJS.start_payment() uses the mini-app SDK's
    // window.nimiq.sendBasicTransactionWithData(). On a plain web browser there
    // is no window.nimiq provider (that's the "payment failed: no_provider"
    // error), so payments must go through the Hub API's checkout() popup — the
    // same channel web sign-in uses. checkout() opens the Hub popup, the user
    // confirms, Hub broadcasts the NIM transaction to the network, and returns
    // a SignedTransaction whose hash the backend then verifies on-chain
    // (getTransactionByHash — see backend/game/vsroom.go). Result is written to
    // document.body.dataset.nimiqPay in the SAME {ok,tx}/{ok,err} shape the
    // native path uses, so NimiqJS.await_payment() needs no changes.
    // MUST be called synchronously from a real user gesture (the "Pay" button's
    // pressed handler) for the popup not to be blocked — same as _nimiqHubSign.
    function _finishHubCheckout(promise) {
      promise.then(function(result) {
        // Hub's SignedTransaction exposes the on-chain tx hash as .hash; guard
        // across Hub versions with a couple of fallbacks just in case.
        var hash = (result && (result.hash || result.transactionHash
          || (result.raw && result.raw.hash))) || '';
        document.body.dataset.nimiqPay = JSON.stringify({ ok: true, tx: String(hash) });
        console.log('[HubCheckout] ok tx=' + hash);
      }).catch(function(err) {
        var msg = (err && err.message) ? err.message : String(err);
        console.warn('[HubCheckout] failed:', err, msg);
        document.body.dataset.nimiqPay = JSON.stringify({ ok: false, err: msg });
      });
    }
    window._nimiqHubCheckout = function(recipient, valueLuna, extraData) {
      document.body.dataset.nimiqPay = '';

      if (extraData) req.extraData = extraData;  // the "vs:<room>:<c|o>" memo tag
      if (window._HubApiCtor) {
        console.log('[HubCheckout] FAST PATH — calling checkout synchronously');
        _finishHubCheckout(_getHubApi(window._HubApiCtor).checkout(req));
        return;
      }
      console.warn('[HubCheckout] SLOW PATH — _HubApiCtor not ready yet at click time, falling back to async load (popup may be blocked)');
      _finishHubCheckout(_loadHubApi().then(function(HubApiCtor) {
        return _getHubApi(HubApiCtor).checkout(req);
      }));
    };

    // Fire-and-forget: any failure here just means _nimiqHubSign() falls
    // back to the slow-network path above when actually needed; nothing
    // else depends on this promise directly.
    console.log('[HubSign] eager preload starting...');
    _loadHubApi().then(function() {
      console.log('[HubSign] eager preload finished OK — _HubApiCtor ready');
    }).catch(function(err) {
      console.warn('[HubSign] eager preload failed (will retry on demand):', err);
    });

  <!-- ── NATIVE AUDIO ──────────────────────────────────────────────────────── -->
  <script data-cfasync="false">
  (function() {
    var _sounds  = {};
    var _busVol  = { BGM:0.55, SFX_Jump:0.85, SFX_Damage:0.90, Master:1.0 };
    var _busMute = { BGM:false, SFX_Jump:false, SFX_Damage:false, Master:false };
    var _unlocked = false;

    function _effVol(bus) {
      if (_busMute[bus] || _busMute.Master) return 0;
      // BUG FIX: "x || 1" treats a real 0 (slider dragged all the way down —
      // fully muted) as "unset" and silently snaps it back to full volume 1.
      // _busVol always has real defaults seeded above, so there's no actual
      // "unset" case to guard against — use the stored value as-is.
      var b = _busVol[bus];
      var m = _busVol.Master;
      if (typeof b !== 'number' || isNaN(b)) b = 1;
      if (typeof m !== 'number' || isNaN(m)) m = 1;
      return Math.max(0, Math.min(1, b * m));
    }
    function _reg(name, url, bus, loop) {
      var a = new Audio();
      a.src=url; a.preload='auto'; a.loop=!!loop;
      a.addEventListener('error', function(){ if(window._DEV) console.warn('[Audio] load failed: '+name); });
      _sounds[name] = { audio:a, bus:bus };
    }
    // bgm switched from .wav (13.6MB, uncompressed 44.1kHz/16-bit) to .ogg
    // (Vorbis q4, ~1.2MB) — same track, ~11x smaller download on first load.
    // Native <audio> plays OGG Vorbis fine on every browser this game
    // targets (Chrome/Safari/Firefox, desktop+mobile); no fallback needed.
    _reg('bgm',    'assets/audio/bgm.ogg',    'BGM',      true);
    _reg('jump',   'assets/audio/jump.wav',   'SFX_Jump', false);
    _reg('damage', 'assets/audio/damage.wav', 'SFX_Damage', false);

    window._gdSound = function(cmd) {
      if (cmd === 'unlock') { _unlocked=true; return; }
      if (!_unlocked) return;
      var s;
      if (cmd === 'bgm_play') {
        s=_sounds.bgm; if(s&&s.audio.paused){ s.audio.volume=_effVol('BGM'); s.audio.play().catch(function(){}); }
      } else if (cmd === 'bgm_stop') {
        s=_sounds.bgm; if(s){s.audio.pause();s.audio.currentTime=0;}
      } else if (cmd === 'jump_play') {
        s=_sounds.jump; if(s){s.audio.currentTime=0;s.audio.volume=_effVol('SFX_Jump');s.audio.play().catch(function(){});}
      } else if (cmd === 'damage_play') {
        s=_sounds.damage; if(s){s.audio.currentTime=0;s.audio.volume=_effVol('SFX_Damage');s.audio.play().catch(function(){});}
      }
    };
    window._gdSetBus = function(bus, vol, muted) {
      _busVol[bus]=parseFloat(vol)||0;
      _busMute[bus]=(muted===true||muted==='true');
      // BUG FIX: this used to only refresh sounds whose OWN bus matches the
      // bus that just changed — but nothing is ever registered with
      // bus==='Master' (sounds are tagged 'BGM'/'SFX_Jump'/'SFX_Damage'), so
      // a Master-only change (the master mute toggle) matched ZERO sounds
      // here and never touched their actual <audio>.volume at all. Master
      // mute state itself was still recorded correctly (_effVol reads it),
      // but any sound that doesn't recompute its volume fresh right before
      // playing (i.e. an already-looping BGM) kept whatever volume it had
      // from before — so toggling mute while BGM was already playing didn't
      // reliably (im)mute it via THIS path (bgm_stop covers the mute-BGM
      // case separately, but this is the general fix). When bus is 'Master',
      // refresh every registered sound's volume, not just an (empty) subset.
      Object.keys(_sounds).forEach(function(n){
        if (bus === 'Master' || _sounds[n].bus === bus) _sounds[n].audio.volume = _effVol(_sounds[n].bus);
      });
    };
    function _unlock(){ _unlocked=true; }
    ['touchstart','mousedown','keydown','click'].forEach(function(ev){
      document.addEventListener(ev,_unlock,{once:true,capture:true,passive:true});
    });
  })();
  </script>

  <!-- ── NIMIQ PAY BANNER ───────────────────────────────────────────────────── -->
  <script data-cfasync="false">
  (function() {
    // Deep-link host resolution mirrors ApiConfig.gd's game_url():
    //   1. ?game_url= query param
    //   2. localStorage 'nj_game_url'
    //   3. this page's own origin (window.location.origin)
    //   4. hardcoded last-resort fallback (only if all else fails)
    function resolveGameHost() {
      try {
        var q = (new URLSearchParams(window.location.search)).get('game_url');
        if (q) return q.replace(/^https?:\/\//, '').replace(/\/$/, '');
      } catch(e) {}
      try {
        var ls = localStorage.getItem('nj_game_url');
        if (ls) return ls.replace(/^https?:\/\//, '').replace(/\/$/, '');
      } catch(e) {}
      if (window.location.origin && window.location.origin !== 'null') {
        return window.location.origin.replace(/^https?:\/\//, '').replace(/\/$/, '');
      }
      return ''; // nothing resolved — deep link will be built without a host
    }
    var _host = resolveGameHost();
    var DEEP_LINK = _host ? ('nimiqpay://miniapp?url=' + _host) : '';
    try { if (sessionStorage.getItem('nq_banner_dismissed')==='1') return; } catch(e) {}

    // We're already inside Nimiq Pay if either the host injects window.nimiqPay,
    // or our own SDK init (see _initNimiq above) found a wallet provider and set
    // window.nimiq / window._nimiqReady.
    function insideNimiqPay() {
      return !!(window.nimiqPay || window.nimiq || window._nimiqReady);
    }
    // Definitive negative: _initNimiq's sdk.init() rejected ("provider not found")
    // or the SDK failed to load entirely — this is the real "we are NOT in Nimiq
    // Pay" signal, set by the NIMIQ SDK script above. Only fires from here.
    function providerConfirmedMissing() {
      return !!window._nimiqProviderMissing;
    }

    // ── "Get Nimiq Pay" store link + fallback popup ─────────────────────────
    // BUG FIX: the "Open ↗" button just fired the nimiqpay:// custom-scheme
    // deep link and stopped there — if Nimiq Pay isn't actually installed
    // (the common case for someone hitting the game link from a tweet/share/
    // search result), a custom scheme the OS doesn't recognize does NOTHING
    // visible at all: no error, no fallback, button just looks broken. Same
    // gap existed for "Connect Wallet" inside the game (StatsPanel/QuestPanel/
    // LeaderboardPanel) when there's no provider to connect to — it silently
    // no-ops instead of telling the player what to do. Both now go through
    // this one popup: real per-platform store link (iOS App Store / Android
    // Play Store ids below are Nimiq Pay's actual listing, confirmed live),
    // desktop falls back to the informational nimiq.com/nimiq-pay/ page since
    // there's no store link that makes sense there.
    var STORE_URL_IOS     = 'https://apps.apple.com/us/app/nimiq-pay/id6471844738';
    var STORE_URL_ANDROID = 'https://play.google.com/store/apps/details?id=com.nimiq.pay';
    var STORE_URL_DESKTOP = 'https://www.nimiq.com/nimiq-pay/';

    function getNimiqStoreUrl() {
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS 13+ UA quirk
      if (isIOS) return STORE_URL_IOS;
      if (/Android/i.test(ua)) return STORE_URL_ANDROID;
      return STORE_URL_DESKTOP;
    }

    function showInstallPopup() {
      if (document.getElementById('nq-install-popup')) return; // don't stack duplicates
      var overlay = document.createElement('div');
      overlay.id = 'nq-install-popup';
      overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.6);' +
        'display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:24px;box-sizing:border-box';
      var card = document.createElement('div');
      card.style.cssText = 'background:#1a1a2e;color:#fff;border-radius:16px;padding:24px;max-width:340px;' +
        'width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5)';
      var title = document.createElement('div');
      title.textContent = 'Get Nimiq Pay';
      title.style.cssText = 'font-size:18px;font-weight:bold;margin-bottom:10px';
      var body = document.createElement('div');
      body.textContent = "Looks like you don't have Nimiq Pay installed yet — install it to connect your wallet and earn 2× the NIM rewards. Web play pays only half.";
      body.style.cssText = 'font-size:14px;line-height:1.4;color:#cfd0e0;margin-bottom:18px';
      var getBtn = document.createElement('button');
      getBtn.textContent = 'Get Nimiq Pay ↗';
      getBtn.style.cssText = 'background:#f6b221;color:#1a1a2e;border:none;border-radius:10px;' +
        'padding:12px 20px;font-weight:bold;font-size:15px;cursor:pointer;width:100%;margin-bottom:10px';
      getBtn.onclick = function(){ window.open(getNimiqStoreUrl(), '_blank'); };
      var closeBtn = document.createElement('button');
      closeBtn.textContent = 'Not now';
      closeBtn.style.cssText = 'background:transparent;color:#9a9ab0;border:none;font-size:14px;cursor:pointer;padding:6px';
      closeBtn.onclick = function(){ overlay.remove(); };
      card.appendChild(title); card.appendChild(body); card.appendChild(getBtn); card.appendChild(closeBtn);
      overlay.appendChild(card);
      overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }
    // Exposed so GDScript (Main.gd's Connect Wallet handlers) can trigger the
    // exact same popup via JavaScriptBridge.eval when there's no provider —
    // one popup, one set of store links, instead of duplicating this in Godot.
    window._showNimiqInstallPopup = showInstallPopup;

    function showBanner() {
      if (insideNimiqPay()) return;
      var banner=document.createElement('div');
      banner.id='nq-banner';
      banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99998;background:linear-gradient(90deg,#1a1a2e,#16213e);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-family:sans-serif;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.5);box-sizing:border-box';
      var txt=document.createElement('span');
      txt.textContent='🐰 Play in Nimiq Pay & earn 2× NIM rewards!';
      txt.style.cssText='flex:1;margin-right:10px;line-height:1.3';
      var open=document.createElement('button');
      open.textContent='Open ↗';
      open.style.cssText='background:#f6b221;color:#1a1a2e;border:none;border-radius:8px;padding:7px 14px;font-weight:bold;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0';
      // Deferred-deep-link pattern: fire the custom-scheme link, then check
      // back in shortly — if the tab is still visible/foregrounded, the OS
      // had no handler for nimiqpay:// (app not installed) and nothing
      // happened, so show the install popup instead of leaving the button
      // looking like it did nothing at all.
      open.onclick=function(){
        if (!DEEP_LINK) { showInstallPopup(); return; }
        window.location.href = DEEP_LINK;
        setTimeout(function(){
          if (document.visibilityState === 'visible') showInstallPopup();
        }, 1200);
      };
      var cls=document.createElement('button');
      cls.textContent='✕';
      cls.style.cssText='background:transparent;color:#aaa;border:none;font-size:18px;cursor:pointer;margin-left:8px;padding:0 4px;flex-shrink:0';
      cls.onclick=function(){
        banner.style.display='none';
        try{sessionStorage.setItem('nq_banner_dismissed','1');}catch(e){}
      };
      banner.appendChild(txt); banner.appendChild(open); banner.appendChild(cls);
      if (document.body) document.body.appendChild(banner);
      else document.addEventListener('DOMContentLoaded',function(){document.body.appendChild(banner);});
    }

    // Wait for the SDK's definitive result instead of guessing off a fixed delay.
    // _initNimiq starts ~3.5s after load and sdk.init() itself can take up to 10s,
    // so worst case this can take up to ~15s — that's fine, it's the correct signal.
    // A generous ceiling is kept only as a safety net in case the SDK hangs/never
    // resolves (e.g. blocked network); in that edge case we fall back to showing.
    var MAX_WAIT_MS = 16000, STEP_MS = 100, waited = 0;
    var poll = setInterval(function() {
      waited += STEP_MS;
      if (insideNimiqPay()) { clearInterval(poll); return; }               // confirmed: inside -> never show
      if (providerConfirmedMissing()) { clearInterval(poll); showBanner(); return; } // confirmed: not inside -> show now
      if (waited >= MAX_WAIT_MS) { clearInterval(poll); showBanner(); }    // safety-net fallback
    }, STEP_MS);
  })();
  </script>

<!-- ── ERROR CAPTURE + BACKEND LOG FLUSH ─────────────────────────────────────
     Always active: catches errors silently and batches them to /backend/client-log.
     DEV mode adds: visible overlay, copy button, FPS counter.
─────────────────────────────────────────────────────────────────────────── -->
<script data-cfasync="false">
(function(){
  var DEV = window._DEV;

  // ── Dev overlay (only in ?dev mode) ──────────────────────────────────────
  var _log = function(){}; // no-op in prod
  if (DEV) {
    var box=document.createElement('div');
    box.style.cssText='position:fixed;bottom:44px;left:0;right:0;max-height:60vh;overflow-y:auto;background:rgba(0,0,0,.95);color:#0f0;font:11px monospace;z-index:99999;padding:4px;display:none';
    document.body.appendChild(box);

    var btn=document.createElement('button');
    btn.textContent='🐛';
    btn.style.cssText='position:fixed;bottom:4px;right:6px;z-index:100000;background:#333;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer';
    btn.onclick=function(){box.style.display=box.style.display==='none'?'block':'none';box.scrollTop=box.scrollHeight;};
    document.body.appendChild(btn);

    var copyBtn=document.createElement('button');
    copyBtn.textContent='📋';
    copyBtn.style.cssText='position:fixed;bottom:4px;right:48px;z-index:100000;background:#444;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer';
    var _lines=[];
    copyBtn.onclick=function(){
      var txt=_lines.join('\n');
      if(navigator.clipboard){navigator.clipboard.writeText(txt);}
      else{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
      copyBtn.textContent='✓';setTimeout(function(){copyBtn.textContent='📋';},1500);
    };
    document.body.appendChild(copyBtn);

    _log = function(msg, color) {
      var line = new Date().toISOString().slice(11,19)+' '+msg;
      _lines.push(line);
      var d=document.createElement('div');
      d.textContent=line;
      d.style.cssText='border-bottom:1px solid #111;padding:1px 0;color:'+(color||'#0f0');
      box.appendChild(d);
      if(_lines.length>500){_lines.shift();if(box.firstChild)box.removeChild(box.firstChild);}
      box.scrollTop=box.scrollHeight;
    };

    // FPS monitor (dev only)
    var _ff=0,_fl=performance.now(),_fp=0,_fw=0,_fs=0;
    function _fpsCount(){
      var now=performance.now(),ft=now-_fp;_fp=now;
      if(ft>0&&ft<500){_fs+=ft;if(ft>_fw)_fw=ft;}_ff++;
      if(now-_fl>=5000){
        _log('FPS='+Math.round(_ff*1000/(now-_fl))+' avgFT='+Math.round(_fs/_ff)+'ms worstFT='+Math.round(_fw)+'ms');
        _ff=0;_fl=now;_fw=0;_fs=0;
      }
      requestAnimationFrame(_fpsCount);
    }
    requestAnimationFrame(_fpsCount);

    // Device info on start
    _log('UA: '+navigator.userAgent.slice(0,100));
    _log('DPR='+window.devicePixelRatio+' screen='+screen.width+'x'+screen.height);
    _log('hwConcurrency='+navigator.hardwareConcurrency);

  window._earlyLog = _log;

  // _enqueue itself is exposed further down, right after it's defined —
  // see window._enqueueLog below.

  // ── Backend log queue ────────────────────────────────────────────────────
  var _queue = [];
  var _timer = null;
  // BUG FIX: this used to be the relative path '/backend/client-log', which
  // resolves against the PAGE's own origin (window.location.origin). The
  // game's static files are hosted on nimjump.zetashare.com, but the actual
  // Go backend lives on a DIFFERENT domain, backbone.zetashare.com (see
  // ApiConfig.gd's PROD_BASE) — there is no reverse-proxy making
  // nimjump.zetashare.com/backend/* reach the backend, so every request
  // 404'd against the game's own static host. Fix: resolve the same base URL
  // ApiConfig.gd uses (window.NJ_API_BASE > query param ?api= > localStorage
  // nj_api_base > the hardcoded prod backend), so this always hits the real
  // backend regardless of which domain served the page.
  //
  // BUG FIX #2: devtools (start-dev-tunnels.js) overrides ApiConfig.gd's
  // PROD_BASE for every Godot-side network call, but this block runs in
  // plain JS before/alongside the engine and never shared that override —
  // it only ever checked ?api=/localStorage, which nothing actually sets, so
  // every /backend/client-log POST during a devtools tunnel test kept going
  // to the hardcoded prod fallback below and got CORS-rejected (prod's
  // allowlist doesn't know the tunnel origin). window.NJ_API_BASE closes
  // that gap: devtools' frontend static server now injects it directly into
  // this served index.html with the current backend tunnel URL (see
  // injectApiBase() in start-dev-tunnels.js) — checked first, before the
  // query param / localStorage fallbacks, which remain for the case of
  // manually testing against a non-default backend without devtools.
  var _API_BASE = (function(){
    try {
      if (window.NJ_API_BASE) return String(window.NJ_API_BASE).replace(/\/+$/, '');
    } catch(e) {}
    try {
      var q = new URLSearchParams(window.location.search).get('api');
      if (q) return q.replace(/\/+$/, '');
    } catch(e) {}
    try {
      var ls = window.localStorage && window.localStorage.getItem('nj_api_base');
      if (ls) return ls.replace(/\/+$/, '');
    } catch(e) {}
    return 'https://backbone.zetashare.com'; // keep in sync with ApiConfig.gd PROD_BASE
  })();
  var _BACKEND = _API_BASE + '/backend/client-log';

  function _deviceMeta() {
    return {
      user_agent: (navigator.userAgent||'').slice(0,200),
      screen:     screen.width+'x'+screen.height,
      platform:   (navigator.userAgentData&&navigator.userAgentData.platform)||navigator.platform||'',
      dpr:        String(window.devicePixelRatio||1)
    };
  }

  function _flush() {
    if (!_queue.length) return;
    var batch = _queue.splice(0, 30);
    var payload = Object.assign({ entries: batch }, _deviceMeta());
    var headers = { 'Content-Type': 'application/json' };
    var tok = window._nimiqAuthToken || '';
    if (tok) headers['Authorization'] = 'Bearer '+tok;
    var body = JSON.stringify(payload);
    // BUG FIX: this used to silently swallow every failure with no retry.
    // In devtools tunnel testing, the very first POST here (this fires
    // before Godot/wasm even loads) can land on Cloudflare's edge before a
    // freshly-created Quick Tunnel has fully settled, getting a 502 with no
    // CORS headers — a transient infra blip, not a real failure. One quiet
    // retry after a short delay avoids losing that entry outright; still a
    // no-op fire-and-forget after that (this is a write-only diagnostic
    // sink, never worth bothering the player about).
    fetch(_BACKEND, { method:'POST', headers:headers, body:body, keepalive:true })
      .catch(function(){
        setTimeout(function(){
          fetch(_BACKEND, { method:'POST', headers:headers, body:body, keepalive:true }).catch(function(){});
        }, 800);
      });
  }

  function _enqueue(level, msg) {
    _queue.push({ level:level, message:msg });
    if (_queue.length >= 30) { clearTimeout(_timer); _timer=null; _flush(); return; }
    // Any "error" in the queue gets a short debounce (250ms — still batches
    // a burst of errors from the same crash into one request) instead of
    // waiting up to 30s like pure warn/info. Reasoning: if the page/webview
    // gets killed abruptly right after an error (very plausible here — this
    // runs inside Nimiq Pay's mini-app host, which can switch away from /
    // kill the tab with zero warning, unlike a normal desktop browser tab
    // close), anything still sitting in the 30s-debounced queue never
    // reaches the backend — no pagehide/visibilitychange fires either,
    // since the host isn't giving the page a normal close. Recomputed from
    // the whole queue's contents (not just this call's level) so a warn
    // arriving right after a queued error can't push the error's flush back
    // out to the slow 30s timer.
    var hasError = false;
    for (var i = 0; i < _queue.length; i++) { if (_queue[i].level === 'error') { hasError = true; break; } }
    var delayMs = hasError ? 250 : 30000;
    clearTimeout(_timer);
    _timer = setTimeout(function(){ _timer=null; _flush(); }, delayMs);
  }
  // Exposed so the separate Engine-bootstrap <script> block further down
  // (which runs in its own IIFE/scope, can't see this one's locals) can
  // report the capability probe / missing-features result through the same
  // queue/backend-flush machinery instead of duplicating it.
  window._enqueueLog = _enqueue;

  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') _flush(); });
  window.addEventListener('pagehide', _flush);

  // ── Error hooks ──────────────────────────────────────────────────────────
  var _ol=console.log.bind(console), _ow=console.warn.bind(console), _oe=console.error.bind(console);

  window.onerror = function(msg, src, line, col, err) {
    var m = String(msg).slice(0,300)+' @'+String(src).slice(-60)+':'+line;
    if (DEV) { _log('❌ '+m, '#f55'); if(err&&err.stack) _log('  '+err.stack.slice(0,200),'#f88'); box.style.display='block'; }
    _enqueue('error', m);
    return false;
  };
  window.addEventListener('unhandledrejection', function(e) {
    var r=e.reason, m='REJECT: '+((r&&(r.message||String(r)))||'?').slice(0,300);
    if (DEV) { _log('❌ '+m,'#f88'); if(r&&r.stack)_log('  '+r.stack.slice(0,200),'#f88'); box.style.display='block'; }
    _enqueue('error', m);
  });
  window.addEventListener('error', function(e) {
    var t=e.target;
    if (t && t!==window && t.tagName) {
      var url=t.src||t.href||'?';
      var m='RESOURCE_FAIL: <'+t.tagName.toLowerCase()+'> '+String(url).slice(-200);
      if (DEV) { _log('❌ '+m,'#f55'); box.style.display='block'; }
      _enqueue('error', m);
    }
  }, true);
  window.addEventListener('securitypolicyviolation', function(e) {
    var m='CSP: '+e.violatedDirective+' blocked='+String(e.blockedURI).slice(0,150);
    if (DEV) { _log('⚠ '+m,'#f80'); box.style.display='block'; }
    _enqueue('warn', m);
  });

  // Override console only in dev (avoid overhead in prod)
  if (DEV) {
    console.log   = function(){ var m=Array.prototype.join.call(arguments,' '); _log(m.slice(0,200)); _ol.apply(console,arguments); };
    console.warn  = function(){ var m=Array.prototype.join.call(arguments,' '); _log('⚠ '+m.slice(0,200),'#ff0'); _enqueue('warn',m.slice(0,300)); _ow.apply(console,arguments); };
    console.error = function(){ var m=Array.prototype.join.call(arguments,' '); _log('❌ '+m.slice(0,200),'#f55'); _enqueue('error',m.slice(0,300)); box.style.display='block'; _oe.apply(console,arguments); };
  }
  // In prod, still capture console.error/warn to backend
  else {
    console.warn  = function(){ _enqueue('warn',  Array.prototype.join.call(arguments,' ').slice(0,300)); _ow.apply(console,arguments); };
    console.error = function(){ _enqueue('error', Array.prototype.join.call(arguments,' ').slice(0,300)); _oe.apply(console,arguments); };
  }
})();
</script>

<!-- ── GAME ENGINE LOADER ──────────────────────────────────────────────────── -->
<script data-cfasync="false">
(function() {
  var DEV = window._DEV;
  var gameUrl = "$GODOT_URL";
  if (DEV) window._earlyLog("⏳ Downloading game.js…");

  fetch(gameUrl)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(code) {
      // Bypass Safari v15.2 check injected by Emscripten.
      //
      // Emscripten ships this check because of a real WebKit WASM bug that
      // existed before Safari 15.2 — it's not overcautious noise, it's a
      // guard against actual miscompiles/crashes on those older builds.
      // Whoever added this bypass presumably found it too aggressive for
      // some Safari version that in practice worked fine — but stripping it
      // unconditionally means ANY visitor still on a genuinely-affected
      // pre-15.2 Safari (this device's floor is iOS 15.0+ for WebGL2 to
      // begin with, so the exposed window here is specifically 15.0/15.1)
      // now attempts to run anyway. Instead of Emscripten's own clean "your
      // Safari is too old" error, they can hit the raw underlying WASM bug
      // directly — which looks like exactly this ticket: "game doesn't even
      // open," no clear error, nothing obviously wrong in a screenshot.
      // Not reverting this blind (don't know what specifically it was
      // fixing for whoever added it) — but this was previously only logged
      // in DEV, so there was literally no data on how often it fires in
      // production. Logging it for real now so the Logs tab can be
      // cross-referenced against the device-capability probe above (same
      // session, same timestamp) to see whether "won't open" reports
      // cluster on exactly this Safari version range.
      var p1=/throw\s+new\s+Error\(['"]This emscripten-generated code requires Safari v15.2.0.*?['"]\);?/g;
      if(p1.test(code)){
        code=code.replace(p1,'/* Safari check bypassed */');
        if(DEV) window._earlyLog("🎯 Safari throw removed");
        if (window._enqueueLog) window._enqueueLog('warn', 'SAFARI_BYPASS: pre-15.2 Safari check stripped, attempting run anyway — ' + navigator.userAgent.slice(0,150));
      }
      if(code.includes("requires Safari v15.2.0")){
        code=code.split('\n').map(function(l){
          return l.includes("requires Safari v15.2.0") ? "/* "+l+" */" : l;
        }).join('\n');
        if(DEV) window._earlyLog("🛡️ Safari line cleaned");
      }
      var s=document.createElement('script');
      s.text=code; s.setAttribute('data-cfasync','false');
      document.body.appendChild(s);
      window._godotEngineLoaded=true;
      if(window._startGodotSetup) window._startGodotSetup();
    })
    .catch(function(err){
      window._earlyLog && window._earlyLog('❌ game.js INJECT ERROR: '+err.message,'#f55');
    });
})();
</script>

<!-- ── GODOT ENGINE INIT ───────────────────────────────────────────────────── -->
<script data-cfasync="false">
function initGodotGame() {
  var DEV = window._DEV;
  var GODOT_CONFIG = $GODOT_CONFIG;
  GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] = false;
  GODOT_CONFIG['serviceWorker'] = '';

  // Cap DPR at 1.5 to reduce GPU load on high-DPI screens
  (function() {
    var canvas=document.getElementById('canvas'); if(!canvas) return;
    var dpr=Math.min(window.devicePixelRatio||1, 1.5);
    if(dpr<(window.devicePixelRatio||1)){
      var rect=canvas.getBoundingClientRect();
      canvas.width=Math.round(rect.width*dpr);
      canvas.height=Math.round(rect.height*dpr);
      if(DEV) window._earlyLog('DPR capped: '+dpr.toFixed(2)+' (native='+(window.devicePixelRatio||1).toFixed(2)+')');
    }
    // Diagnostic: catch real WebGL context-lost events. Won't catch a hard
    // process-level crash, but if the Firefox/webview crash is a recoverable
    // context loss rather than a full process kill, this finally gives us a
    // visible log line instead of a silent reload.
    canvas.addEventListener('webglcontextlost', function(e){
      e.preventDefault();
      console.error('WEBGL_CONTEXT_LOST', e);
      if (window._earlyLog) window._earlyLog('❌ WEBGL_CONTEXT_LOST','#f55');
      if (window._enqueueLog) window._enqueueLog('error', 'WEBGL_CONTEXT_LOST');
    }, false);
  })();

  if (typeof Engine === 'undefined') {
    if(DEV) window._earlyLog('❌ Engine not found','#f55');
    return;
  }

  // Better WebGL context for WebView
  // NOTE: desynchronized:true is disabled on Firefox/Gecko AND on WebKit
  // (Safari engine). It skips compositor vsync to reduce input latency, but
  // on Gecko and on WebKit-based system webviews this has been the trigger
  // for a GPU process crash right at first-frame/framebuffer allocation,
  // which the browser then "recovers" from by silently reloading the page —
  // no JS error, no time to flush logs, just "loads to 100% then reloads
  // itself". Chrome/Blink tolerates it fine, hence the Chrome-works /
  // Firefox+Safari-crash split.
  //
  // BUG FIX: the previous check only matched literal Firefox
  // (/Firefox/i.test(ua)), which misses the actual majority of affected
  // sessions — on iOS, EVERY browser (Safari, Chrome-iOS/"CriOS",
  // Firefox-iOS/"FxiOS", and any in-app WKWebView such as Nimiq Pay's
  // mini-app host) runs on the WebKit engine under the hood, Apple requires
  // it platform-wide. So the old check left desynchronized:true ON for all
  // of those, and the GPU-crash-reload kept firing there — no UA string
  // ever contains "Firefox" but the browser itself is still WebKit.
  // Detect "is this WebKit" instead of "is this literally Firefox", plus
  // keep the standalone Gecko check for desktop/Android Firefox.
  var _ua = navigator.userAgent;
  var _isGecko = /Firefox/i.test(_ua) && !/Seamonkey/i.test(_ua);
  // Any Apple touch device (iPhone/iPad/iPod, plus iPadOS 13+ which reports
  // as "MacIntel" but exposes touch points) is WebKit-only at the engine
  // level regardless of what the UA's browser name claims.
  var _isAppleTouch = /iPad|iPhone|iPod/.test(_ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  // Desktop Safari itself (not Chrome/Firefox spoofing as Safari — those
  // still include their own token even on Mac).
  var _isDesktopSafari = /^((?!chrome|android|crios|fxios|edg).)*safari/i.test(_ua);
  var _isWebKitCrashRisk = _isGecko || _isAppleTouch || _isDesktopSafari;
  var _origCtx=HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext=function(type,attrs){
    if(type==='webgl2'||type==='webgl'||type==='webgl-experimental'){
      attrs=Object.assign({
        powerPreference:'high-performance', desynchronized: !_isWebKitCrashRisk,
        preserveDrawingBuffer:false, antialias:false,
        depth:true, stencil:false, alpha:false,
      },attrs||{});
    }
    return _origCtx.call(this,type,attrs);
  };

  var engine=new Engine(GODOT_CONFIG);
  var statusOverlay =document.getElementById('status');
  var statusProgress=document.getElementById('status-progress');
  var statusNotice  =document.getElementById('status-notice');
  var initializing=true, statusMode='';

  function setStatusMode(mode) {
    if(statusMode===mode||!initializing) return;
    if(mode==='hidden'){statusOverlay.remove();initializing=false;return;}
    statusOverlay.style.visibility='visible';
    statusProgress.style.display=mode==='progress'?'block':'none';
    statusNotice.style.display  =mode==='notice'  ?'block':'none';
    statusMode=mode;
  }
  function displayFailureNotice(err) {
    console.error(err);
    statusNotice.innerHTML='An error occurred trying to run '+GODOT_CONFIG['executable']+':<br>'+err.message;
    setStatusMode('notice');
  }

  // ── Capability probe ──────────────────────────────────────────────────────
  // Godot 4's web export (gl_compatibility renderer) hard-requires WebGL2 —
  // there is no WebGL1 fallback anywhere in Godot 4 (unlike Godot 3's GLES2
  // export); this is an engine-level limitation, confirmed against Godot's
  // own docs/forum, not something any project-side code change can add back.
  // What we CAN do: know exactly who this excludes and see it in the admin
  // Logs tab, instead of guessing. This probe runs on EVERY load (not just
  // failures) so the full device population is visible, not only the ones
  // that fail — sent as "info" so it never gets lost/misread as an actual
  // error in the Logs tab's error count.
  function _probeCapabilities() {
    var webgl1 = false, webgl2 = false, renderer = '', vendor = '';
    try {
      var c1 = document.createElement('canvas');
      var gl1 = c1.getContext('webgl') || c1.getContext('experimental-webgl');
      webgl1 = !!gl1;
      var c2 = document.createElement('canvas');
      var gl2 = c2.getContext('webgl2');
      webgl2 = !!gl2;
      var gl = gl2 || gl1;
      if (gl) {
        var dbg = gl.getExtension('WEBGL_debug_renderer_info');
        if (dbg) {
          renderer = String(gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || '').slice(0, 100);
          vendor   = String(gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL)   || '').slice(0, 60);
        }
      }
    } catch (e) { /* probing itself must never throw */ }
    var mem = (navigator.deviceMemory != null) ? (navigator.deviceMemory + 'GB') : '?';
    var cores = navigator.hardwareConcurrency || '?';
    var msg = 'CAPS webgl1=' + webgl1 + ' webgl2=' + webgl2 +
      ' gpu=' + (vendor || '?') + '/' + (renderer || '?') +
      ' mem=' + mem + ' cores=' + cores;
    if (DEV) window._earlyLog(msg, '#0ff');
    if (window._enqueueLog) window._enqueueLog('info', msg);
    return { webgl1: webgl1, webgl2: webgl2 };
  }
  var _caps = _probeCapabilities();

  // Cross-origin isolation check — kept as an informational log only.
  // crossOriginIsolated is EXPECTED to read false now: backend/main.go's
  // corsMiddleware deliberately relaxed Cross-Origin-Opener-Policy from
  // "same-origin" to "same-origin-allow-popups" (see that file's comment) to
  // fix the Nimiq Hub API's web sign-in popup, which strict COOP was
  // silently breaking ("Invalid Request" from hub.nimiq.com — same-origin
  // severs window.opener for any popup this page opens, which is exactly how
  // Hub's popup talks back to us). Relaxing COOP alone wasn't enough though —
  // Cross-Origin-Embedder-Policy: require-corp had to be removed too, since a
  // cross-origin-isolated page (COOP + COEP together) can't retain
  // window.opener on ANY cross-origin popup regardless of the COOP value.
  // That trade-off costs crossOriginIsolated/
  // SharedArrayBuffer, which this project's export never actually needed —
  // see Engine.getMissingFeatures({threads:false}) below and
  // GODOT_CONFIG['ensureCrossOriginIsolationHeaders']=false. Logged once, up
  // front, purely so a LOAD_STALL report can still be cross-referenced
  // against this if a *future* build ever does add a threaded export.
  var _coi = !!window.crossOriginIsolated;
  var _sab = (typeof SharedArrayBuffer !== 'undefined');
  var _coiMsg = 'COI crossOriginIsolated=' + _coi + ' SharedArrayBuffer=' + _sab;
  if (DEV) window._earlyLog(_coiMsg, '#0ff');
  if (window._enqueueLog) window._enqueueLog('info', _coiMsg);

  // ── Safe-area verification ────────────────────────────────────────────
  // The CSS env(safe-area-inset-*) fix on #canvas/#status (see <style>
  // above) can't be confirmed from here without an actual notched/home-
  // indicator device — logging the REAL computed inset values (in px) for
  // every session means the very first player who opens this on an iPhone
  // with a notch/Dynamic Island shows up in the admin Logs tab with actual
  // non-zero numbers, which is the only real proof the fix is doing
  // anything in production. All-zero on every session just means nobody
  // with a notch/home-indicator has opened it yet (or a device where the
  // safe area truly is zero, e.g. most Android phones) — not that the fix
  // is broken. Read via a throwaway element instead of trusting env()
  // support detection, since that's the only way to get the resolved px
  // value out of CSS into JS at all.
  function _probeSafeArea() {
    try {
      var probe = document.createElement('div');
      probe.style.cssText = 'position:fixed;top:0;left:0;visibility:hidden;pointer-events:none;' +
        'padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);' +
        'padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);';
      document.body.appendChild(probe);
      var cs = getComputedStyle(probe);
      var vals = { top: cs.paddingTop, bottom: cs.paddingBottom, left: cs.paddingLeft, right: cs.paddingRight };
      document.body.removeChild(probe);
      return vals;
    } catch (e) { return null; }
  }
  var _safeArea = _probeSafeArea();
  var _safeAreaMsg = _safeArea
    ? ('SAFE_AREA top=' + _safeArea.top + ' bottom=' + _safeArea.bottom + ' left=' + _safeArea.left + ' right=' + _safeArea.right)
    : 'SAFE_AREA probe-failed';
  if (DEV) window._earlyLog(_safeAreaMsg, '#0ff');
  if (window._enqueueLog) window._enqueueLog('info', _safeAreaMsg);

  var missing=Engine.getMissingFeatures({threads:false});
  if(DEV) window._earlyLog('missing: ['+missing.join(',')+']');
  if (missing.length > 0) {
    // Previously only logged in DEV — in prod this fell through to
    // startGame() anyway, which either eventually rejects deep in WASM
    // setup (no friendly message, since that path only calls
    // displayFailureNotice from the .then() rejection handler below) or, on
    // some devices/browsers, just hangs the loading screen forever with no
    // visible error and no log sent at all if the failure is a synchronous
    // throw during Engine setup that never reaches that rejection handler.
    // Best we can do: fail fast with a clear message instead of a silent
    // stuck spinner, and report it as an error immediately (not debounced,
    // see _enqueue's per-level delay) so the admin Logs tab actually shows
    // how many real users are hitting this and on what device/browser —
    // _probeCapabilities() above already sent the raw webgl1/webgl2/gpu
    // facts for this exact session right before this, so the two log lines
    // pair up by device/ip/time in the admin panel.
    var missMsg = 'Unsupported device/browser — missing: ' + missing.join(', ') +
      ' (webgl1=' + _caps.webgl1 + ' webgl2=' + _caps.webgl2 + ')';
    console.error(missMsg);
    statusNotice.innerHTML = 'Your device or browser doesn\'t support what this game needs to run ('
      + missing.join(', ') + '). Try updating your browser/app, or use a different device.';
    setStatusMode('notice');
    return;
  }

  setStatusMode('progress');
  var _last=-1;
  var _gameStarted=false;
  var _loadStage = 'downloading';       // downloading -> download-complete -> (engine resolves or hangs after this)
  var _lastProgressAt = Date.now();     // updated every time the % actually changes
  var _loadStartAt = Date.now();

  // Best-effort snapshot of the wasm/pck network requests via the Resource
  // Timing API — lets a stall report distinguish "still actively
  // downloading, just slow" from "download already finished ages ago, hung
  // afterward in WASM compile/instantiate/thread-init" (which is the classic
  // symptom of a cross-origin-isolation mismatch — see the COI check above).
  function _assetTimingSummary() {
    try {
      var entries = performance.getEntriesByType('resource').filter(function(e){
        return /\.(wasm|pck)(\?|$)/.test(e.name);
      });
      if (!entries.length) return 'assets=none-observed';
      return entries.map(function(e){
        var done = e.responseEnd > 0;
        var size = e.transferSize || e.encodedBodySize || 0;
        return (e.name.split('/').pop()) + ':' + (done ? 'done' : 'pending') + ':' + size + 'B';
      }).join(',');
    } catch (e) { return 'assets=probe-failed'; }
  }

  // Stall detector — on a slow/flaky connection (very plausible on mobile
  // data, which is most of this game's real traffic), the .wasm/.pck
  // download can just sit there with no progress and no error either: no
  // onProgress call, no rejection, nothing — the loading spinner spins
  // forever with zero signal that anything is wrong. That's another
  // "game just doesn't open" report we'd otherwise have no way to tell
  // apart from a genuine compatibility failure. If nothing has happened by
  // 20s, log it once (still lets it keep trying — no reload forced, in
  // case it's just a slow-but-eventually-fine load).
  //
  // Upgraded to carry enough context to actually diagnose WHICH stage it
  // died in, instead of just a frozen byte percentage: cross-origin
  // isolation state (the #1 suspect for "downloaded fine, hung after"),
  // how long since the % last actually moved (frozen-since vs slow-but-
  // moving), device/network hints, and a resource-timing snapshot of the
  // actual wasm/pck requests.
  var _stallTimer = setTimeout(function(){
    if (_gameStarted) return;
    var frozenForMs = Date.now() - _lastProgressAt;
    var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    var netInfo = conn ? (conn.effectiveType + '/dl=' + conn.downlink + 'Mbps') : 'unknown';
    var stallMsg = 'LOAD_STALL: no engine start after 20s' +
      ' last_progress=' + _last + '%' +
      ' stage=' + _loadStage +
      ' frozen_for_ms=' + frozenForMs +
      ' coi=' + _coi + ' sab=' + _sab +
      ' net=' + netInfo +
      ' cores=' + (navigator.hardwareConcurrency || '?') +
      ' assets=[' + _assetTimingSummary() + ']';
    console.warn(stallMsg);
    // Explicit enqueue (not just relying on the console.warn hook) so this
    // specific diagnostic is guaranteed to reach the admin Logs tab even if
    // the generic console hook ever changes/misses a level.
    if (window._enqueueLog) window._enqueueLog('warn', stallMsg);
  }, 20000);

  engine.startGame({
    onProgress: function(cur,tot){
      if(cur>0&&tot>0){
        statusProgress.value=cur; statusProgress.max=tot;
        var pct=Math.round(cur/tot*100);
        if(pct!==_last){
          _last=pct; _lastProgressAt=Date.now();
          if (pct >= 100) _loadStage = 'download-complete';
          if(DEV&&(pct%10===0||pct===100))window._earlyLog('Loading: '+pct+'%');
        }
      } else {
        statusProgress.removeAttribute('value'); statusProgress.removeAttribute('max');
      }
    }
  }).then(function(){
    _gameStarted=true; clearTimeout(_stallTimer);
    if(DEV) window._earlyLog('✓ Game started');
    setStatusMode('hidden');
  }, function(err){
    _gameStarted=true; clearTimeout(_stallTimer); // stop the stall warning — we have a real, more specific error now
    if(DEV) window._earlyLog('❌ startGame: '+(err&&err.message?err.message:String(err)),'#f55');
    displayFailureNotice(err);
  });
}

window._startGodotSetup=initGodotGame;
if(window._godotEngineLoaded) initGodotGame();
</script>
